name = "LeanEthCS"
defaultTargets = ["LeanEthCS"]
# Mirror the OpenSSL linker args from SizzLean so the
# `eth_ssz_vector_runner` exe can link the `libcrypto.so.3` that
# backs the FFI hasher transitively pulled in by
# `SizzLean.Hasher.Sha256`.
moreLinkArgs = ["-L/usr/lib/x86_64-linux-gnu", "-l:libcrypto.so.3"]
# Lake's leanc default is `-O3 -DNDEBUG -fPIC` with the usual
# hardening flags. We add `-march=native` so the host's
# AVX2/AVX-512/SHA-NI extensions are visible to the Lean→C path on
# every container's deriving-generated codegen. Cascades to the
# `LeanEthCS` lib and the `eth_ssz_vector_runner` exe. Same
# `-march=native` caveat as elsewhere — bakes in the build host's
# ISA.
moreLeancArgs = ["-march=native"]

[[require]]
name = "SizzLean"
path = "../SizzLean"

[[lean_lib]]
name = "LeanEthCS"
precompileModules = true

# CLI driver for the upstream consensus-spec-tests harness. Its
# source (`LeanEthCS/Cli/Main.lean`) is picked up as a regular
# submodule by the `LeanEthCS` lib's default globs.
[[lean_exe]]
name = "eth_ssz_vector_runner"
root = "LeanEthCS.Cli.Main"
supportInterpreter = true
